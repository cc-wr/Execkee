<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Execkee</title>
  <style>
    :root {
      --bg: #0a0e14;
      --surface: #141a23;
      --surface2: #1c2531;
      --border: #2b3645;
      --text: #eef3f8;
      --muted: #8b9bb0;
      --blue: #4aa3ff;
      --green: #3fd17a;
      --amber: #f0a830;
      --red: #ff5d52;
      --gray: #3a4658;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      padding: 2vmin 2.5vmin;
      display: flex;
      flex-direction: column;
      gap: 2vmin;
      min-height: 100vh;
    }

    /* --- Status strip --- */
    .strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2vmin;
    }
    .brand { font-size: 3.2vmin; font-weight: 800; letter-spacing: 0.06em; }
    .indicators { display: flex; align-items: center; gap: 2.4vmin; font-size: 1.9vmin; font-weight: 600; }
    .ind { display: flex; align-items: center; gap: 0.8vmin; color: var(--muted); }
    .dot { width: 1.6vmin; height: 1.6vmin; border-radius: 50%; background: var(--gray); flex-shrink: 0; }
    .dot.green { background: var(--green); box-shadow: 0 0 1.2vmin var(--green); }
    .dot.red { background: var(--red); box-shadow: 0 0 1.2vmin var(--red); }
    .dot.amber { background: var(--amber); }
    .dot.blue { background: var(--blue); }

    /* --- The sentence (focal point) --- */
    .sentence {
      flex: 0 0 auto;
      background: var(--surface);
      border: 0.4vmin solid var(--border);
      border-left-width: 1.4vmin;
      border-radius: 1.4vmin;
      padding: 3.5vmin 4vmin;
      display: flex;
      align-items: center;
      gap: 2.5vmin;
      min-height: 22vmin;
    }
    .sentence.red { border-color: var(--red); background: linear-gradient(90deg, rgba(255,93,82,0.12), var(--surface) 40%); }
    .sentence.amber { border-color: var(--amber); background: linear-gradient(90deg, rgba(240,168,48,0.12), var(--surface) 40%); }
    .sentence.blue { border-color: var(--blue); background: linear-gradient(90deg, rgba(74,163,255,0.10), var(--surface) 40%); }
    .sentence.standby { border-color: var(--border); border-left-color: var(--gray); }
    .s-icon { font-size: 7vmin; line-height: 1; flex-shrink: 0; }
    .s-body { flex: 1; }
    .s-text { font-size: 4vmin; font-weight: 700; line-height: 1.25; }
    .sentence.standby .s-text { color: var(--muted); font-weight: 500; }
    .s-id { margin-top: 1.2vmin; font-size: 1.6vmin; color: var(--muted); letter-spacing: 0.04em; }

    /* --- Lower grid --- */
    .grid { flex: 1; display: grid; grid-template-columns: 1.1fr 1fr; gap: 2vmin; min-height: 0; }
    .panel {
      background: var(--surface);
      border: 0.3vmin solid var(--border);
      border-radius: 1.2vmin;
      padding: 2.2vmin 2.4vmin;
      display: flex;
      flex-direction: column;
      gap: 1.6vmin;
      overflow: auto;
    }
    .col { display: flex; flex-direction: column; gap: 2vmin; min-height: 0; }
    h2 { font-size: 1.7vmin; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }

    /* --- Donut --- */
    .tasks-head { display: flex; align-items: center; gap: 3vmin; }
    .donut-wrap { position: relative; width: 18vmin; height: 18vmin; flex-shrink: 0; }
    .donut { width: 100%; height: 100%; border-radius: 50%;
      background: conic-gradient(var(--green) 0 0deg, var(--blue) 0deg 0deg, var(--gray) 0deg 360deg); }
    .donut::after {
      content: ''; position: absolute; inset: 22%;
      background: var(--surface); border-radius: 50%;
    }
    .donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .donut-center .pct { font-size: 4.5vmin; font-weight: 800; }
    .donut-center .lbl { font-size: 1.4vmin; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .legend { display: flex; flex-direction: column; gap: 1.3vmin; font-size: 2.1vmin; font-weight: 600; }
    .legend .li { display: flex; align-items: center; gap: 1.2vmin; }
    .legend .sw { width: 1.8vmin; height: 1.8vmin; border-radius: 0.4vmin; }
    .legend .n { font-size: 2.6vmin; font-weight: 800; min-width: 1.6vmin; text-align: right; }

    /* --- Task chips --- */
    .tlist { display: flex; flex-direction: column; gap: 1vmin; }
    .titem { display: flex; align-items: center; gap: 1.4vmin; font-size: 2.1vmin; padding: 0.6vmin 0; }
    .check { width: 2.2vmin; height: 2.2vmin; border-radius: 50%; border: 0.35vmin solid var(--gray); flex-shrink: 0; }
    .titem.complete .check { background: var(--green); border-color: var(--green); }
    .titem.inprogress .check { border-color: var(--blue); background: radial-gradient(var(--blue) 40%, transparent 42%); }
    .titem.complete .ttext { text-decoration: line-through; color: var(--muted); }
    .ttext { flex: 1; }
    .chip { font-size: 1.4vmin; font-weight: 800; padding: 0.4vmin 1vmin; border-radius: 0.6vmin; text-transform: uppercase; letter-spacing: 0.05em; }
    .chip.overdue { background: rgba(255,93,82,0.2); color: var(--red); }
    .chip.due-today { background: rgba(240,168,48,0.2); color: var(--amber); }
    .chip.inprogress { background: rgba(74,163,255,0.2); color: var(--blue); }

    /* --- Instances --- */
    .inst { display: flex; align-items: center; gap: 1.4vmin; font-size: 2vmin; padding: 0.5vmin 0; }
    .inst .meta { color: var(--muted); font-size: 1.5vmin; margin-left: auto; }

    /* --- Presumed tasks --- */
    .pitem { display: flex; align-items: flex-start; gap: 1.2vmin; font-size: 1.9vmin; padding: 0.7vmin 0; border-bottom: 0.2vmin solid var(--surface2); }
    .pitem .pbullet { color: var(--blue); font-size: 2vmin; line-height: 1.2; }
    .pitem .ptext { flex: 1; }
    .pitem .psrc { display: block; font-size: 1.4vmin; color: var(--muted); margin-top: 0.3vmin; }
    .pdue { font-size: 1.5vmin; font-weight: 700; color: var(--amber); white-space: nowrap; }

    .flag { background: rgba(255,93,82,0.12); border: 0.2vmin solid rgba(255,93,82,0.4); border-radius: 0.8vmin; padding: 1vmin 1.4vmin; font-size: 1.8vmin; color: #ffd2ce; }
    .empty { color: var(--muted); font-size: 1.7vmin; font-style: italic; }
  </style>
</head>
<body>
  <div class="strip">
    <div class="brand">EXECKEE</div>
    <div class="indicators">
      <span class="ind" id="conn"><span class="dot" id="conn-dot"></span><span id="conn-text">connecting</span></span>
      <span class="ind"><span class="dot blue"></span><span id="inst-count">0 instances</span></span>
      <span class="ind"><span class="dot" id="cycle-dot"></span><span id="cycle-text">no cycle yet</span></span>
    </div>
  </div>

  <div class="sentence standby" id="sentence">
    <div class="s-icon" id="s-icon">○</div>
    <div class="s-body">
      <div class="s-text" id="s-text">Stand by.</div>
      <div class="s-id" id="s-id"></div>
    </div>
  </div>

  <div class="grid">
    <div class="panel">
      <h2>Your Tasks</h2>
      <div class="tasks-head">
        <div class="donut-wrap">
          <div class="donut" id="donut"></div>
          <div class="donut-center"><div class="pct" id="donut-pct">0%</div><div class="lbl">done</div></div>
        </div>
        <div class="legend">
          <div class="li"><span class="sw" style="background:var(--green)"></span><span class="n" id="lg-done">0</span><span>completed</span></div>
          <div class="li"><span class="sw" style="background:var(--blue)"></span><span class="n" id="lg-prog">0</span><span>in progress</span></div>
          <div class="li"><span class="sw" style="background:var(--gray)"></span><span class="n" id="lg-todo">0</span><span>not done</span></div>
        </div>
      </div>
      <div class="tlist" id="tlist"></div>
    </div>

    <div class="col">
      <div class="panel" style="flex:0 0 auto;">
        <h2>Instances</h2>
        <div id="ilist"></div>
      </div>
      <div class="panel" style="flex:1;">
        <h2>From your instances <span style="color:var(--muted);font-weight:600">· not on your list</span></h2>
        <div id="plist"></div>
      </div>
      <div class="panel" id="flags-panel" style="flex:0 0 auto; display:none;">
        <h2>Flags</h2>
        <div id="flist"></div>
      </div>
    </div>
  </div>

  <script>
    function esc(s){const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
    function timeAgo(d){const s=Math.floor((Date.now()-d.getTime())/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}

    function urgencyOf(data){
      if(data.standby||!data.sentence)return'standby';
      const s=((data.sentence.id||'')+' '+(data.sentence.text||'')).toLowerCase();
      if(/urgent|overdue|today|deadline|missed|asap|immediately/.test(s))return'red';
      if(/due|soon|tonight|tomorrow/.test(s))return'amber';
      return'blue';
    }

    function render(data){
      // sentence
      const box=document.getElementById('sentence'), txt=document.getElementById('s-text'), icon=document.getElementById('s-icon'), id=document.getElementById('s-id');
      const u=urgencyOf(data);
      box.className='sentence '+u;
      if(data.standby||!data.sentence){txt.textContent='Stand by.';icon.textContent='○';id.textContent='';}
      else{txt.textContent=data.sentence.text;icon.textContent=u==='red'?'⚠':(u==='amber'?'⏰':'➤');id.textContent='#'+(data.sentence.id||'');}

      // donut + legend
      const tasks=data.dailyTasks||[];
      const done=tasks.filter(t=>t.complete).length;
      const prog=tasks.filter(t=>!t.complete&&t.inProgress).length;
      const todo=tasks.length-done-prog;
      const total=tasks.length||1;
      const dDeg=done/total*360, pDeg=(done+prog)/total*360;
      document.getElementById('donut').style.background=
        `conic-gradient(var(--green) 0 ${dDeg}deg, var(--blue) ${dDeg}deg ${pDeg}deg, var(--gray) ${pDeg}deg 360deg)`;
      document.getElementById('donut-pct').textContent=Math.round(done/total*100)+'%';
      document.getElementById('lg-done').textContent=done;
      document.getElementById('lg-prog').textContent=prog;
      document.getElementById('lg-todo').textContent=todo;

      // task list
      document.getElementById('tlist').innerHTML = tasks.length ? tasks.map(t=>{
        const cls=['titem']; if(t.complete)cls.push('complete'); else if(t.inProgress)cls.push('inprogress');
        let chip='';
        if(!t.complete){
          if(t.status==='overdue')chip='<span class="chip overdue">overdue</span>';
          else if(t.status==='due-today')chip='<span class="chip due-today">today</span>';
          else if(t.inProgress)chip='<span class="chip inprogress">in progress</span>';
        }
        return `<div class="${cls.join(' ')}"><span class="check"></span><span class="ttext">${esc(t.text)}</span>${chip}</div>`;
      }).join('') : '<div class="empty">No tasks today.</div>';

      // instances
      const insts=data.instanceStatus||[];
      document.getElementById('inst-count').textContent=insts.length+(insts.length===1?' instance':' instances');
      document.getElementById('ilist').innerHTML = insts.length ? insts.map(i=>{
        const cls=i.reportFailing?'red':(i.visibility==='foreground'?'green':'blue');
        const ago=i.lastReport?('reported '+timeAgo(new Date(i.lastReport))):(i.reportFailing?'report failing':'no report yet');
        return `<div class="inst"><span class="dot ${cls}"></span><span>${esc(i.name)}</span><span class="meta">${i.visibility} · ${ago}</span></div>`;
      }).join('') : '<div class="empty">No managed instances.</div>';

      // presumed tasks (from instances, not on the primary list)
      const pres=data.presumedTasks||[];
      document.getElementById('plist').innerHTML = pres.length ? pres.map(p=>{
        const due=p.due?`<span class="pdue">${esc(p.due)}</span>`:'';
        const src=p.instance?`<span class="psrc">${esc(p.instance)}</span>`:'';
        return `<div class="pitem"><span class="pbullet">▸</span><span class="ptext">${esc(p.text)}${src}</span>${due}</div>`;
      }).join('') : '<div class="empty">Nothing surfaced from your instances.</div>';

      // flags
      const flags=data.flaggedEvents||[];
      const fp=document.getElementById('flags-panel');
      if(flags.length){fp.style.display='';document.getElementById('flist').innerHTML=flags.map(f=>`<div class="flag">${esc(f.name||f.instanceId)}: ${esc(f.type)}${f.error?(' — '+esc(String(f.error).slice(0,120))):''}</div>`).join('');}
      else fp.style.display='none';

      // cycle freshness
      const cd=document.getElementById('cycle-dot'), ct=document.getElementById('cycle-text');
      if(data.cycleTime){const mins=(Date.now()-new Date(data.cycleTime).getTime())/60000;cd.className='dot '+(mins<35?'green':'amber');ct.textContent='cycle '+timeAgo(new Date(data.cycleTime));}
      else{cd.className='dot';ct.textContent='no cycle yet';}
    }

    let es;
    function connect(){
      const dot=document.getElementById('conn-dot'), txt=document.getElementById('conn-text');
      es=new EventSource('/api/events');
      es.onopen=()=>{dot.className='dot green';txt.textContent='online';};
      es.onmessage=e=>{try{render(JSON.parse(e.data));}catch{}};
      es.onerror=()=>{dot.className='dot red';txt.textContent='offline';es.close();setTimeout(connect,3000);};
    }
    connect();
  </script>
</body>
</html>
